services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      AI_API_KEY: "${AI_API_KEY}"
      AI_BASE_URL: "${AI_BASE_URL:-https://api.openai.com}"
      AI_DEFAULT_MODEL: "${AI_DEFAULT_MODEL:-gpt-4o-mini}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
    ports:
      - "8080:8080"
